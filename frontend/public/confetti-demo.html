<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confetti Demo</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #1a1a2e; overflow: hidden; cursor: pointer; }
  canvas { position: fixed; inset: 0; width: 100%; height: 100%; }
  .hint {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.5); font-family: system-ui; font-size: 1.1rem;
    pointer-events: none; transition: opacity 0.5s;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint" id="hint">Click anywhere for confetti!</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const COLORS = ['#FF6B6B','#4ECDC4','#45B7D1','#FFEAA7','#DDA0DD','#F7DC6F','#BB8FCE','#85C1E9','#F0B27A','#82E0AA'];
let particles = [];
let animating = false;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  ctx.scale(dpr, dpr);
}
resize();
window.addEventListener('resize', resize);

function launchConfetti(x, y) {
  for (let i = 0; i < 120; i++) {
    particles.push({
      x: x + (Math.random() - 0.5) * 60,
      y: y,
      vx: (Math.random() - 0.5) * 14,
      vy: -Math.random() * 16 - 4,
      w: Math.random() * 8 + 4,
      h: Math.random() * 6 + 2,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      rotation: Math.random() * Math.PI * 2,
      rv: (Math.random() - 0.5) * 0.3,
      alpha: 1,
    });
  }
  if (!animating) {
    animating = true;
    requestAnimationFrame(animate);
  }
}

function animate() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  ctx.clearRect(0, 0, W, H);
  let alive = false;

  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.25;
    p.rotation += p.rv;
    p.alpha -= 0.005;

    if (p.alpha <= 0) continue;
    alive = true;

    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    ctx.restore();
  }

  if (alive) {
    requestAnimationFrame(animate);
  } else {
    particles = [];
    animating = false;
  }
}

document.addEventListener('click', (e) => {
  document.getElementById('hint').style.opacity = '0';
  launchConfetti(e.clientX, e.clientY);
});
</script>
</body>
</html>
